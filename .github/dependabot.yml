version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      fumadocs:
        patterns: ["fumadocs*"]
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      tailwindcss:
        patterns: ["tailwindcss", "@tailwindcss*"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
